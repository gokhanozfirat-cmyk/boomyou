name: boomyou
description: "Boomyou"
publish_to: 'none'
version: 1.1.5+16
environment:
  sdk: ^3.5.0
dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.12.0
  flutter_dotenv: ^5.2.1
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  crypto: ^3.0.3
  shared_preferences: ^2.3.0
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^17.2.4
  vibration: ^3.1.8
dependency_overrides:
  storage_client: 2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/boomyou_icon.png
  remove_alpha_ios: true
flutter:
  uses-material-design: true
  assets:
    - .env
